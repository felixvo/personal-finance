<title>Atlas — Interactive Mockup</title>

  .hrow .act{display:flex;gap:6px}
  .link{background:none;border:none;color:var(--accent);font-weight:600;font-size:12.5px;padding:4px 6px;border-radius:6px}
  .link:hover{background:var(--accent-wash)}
  .btn{border:1px solid var(--border);background:var(--surface);color:var(--ink2);
    border-radius:var(--radius-sm);padding:8px 13px;font-weight:600;font-size:13px}
  .btn:hover{background:var(--surface-2);color:var(--ink)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.pri{background:var(--accent);color:var(--accent-ink);border-color:transparent}

  .btn.danger:hover{color:var(--cat-6);border-color:var(--cat-6)}

  input,select{font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;width:100%}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  input.num{text-align:right}

  label.field .lb{font-size:12.5px;font-weight:600;color:var(--ink2);margin-bottom:5px;display:block}

  /* ============ Wizard overlay ============ */
  .overlay{position:fixed;inset:0;background:var(--plane);z-index:50;display:flex;flex-direction:column;overflow:auto}
  .wz-top{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);

  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-top:4px}
  .tcard{border:1px solid var(--border);border-radius:10px;padding:12px 13px 8px;background:var(--surface)}
  .tcard .tt{font-weight:600;font-size:13.5px;line-height:1.2}
  .tcard .tv{font-weight:600;font-size:16px;margin:5px 0 1px;font-variant-numeric:tabular-nums}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .tabs button{border:1px solid var(--border);background:var(--surface);color:var(--ink2);

  .wf{display:grid;grid-template-columns:280px 1fr;gap:24px}

  .banner{background:var(--accent-wash);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);

  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<script>
"use strict";
/* =====================================================================
   ATLAS — interactive mockup.  No backend: state lives in memory, a
   refresh resets to seed.  Formulas mirror docs/07-calculation-engine.md.
   ===================================================================== */

const TODAY = new Date(2026,6,9);           // 2026-07-09 (per session context)
const CUR_PERIOD = "2026-07";

/* ---------- seed data ---------- */
function seed(){
  const holdingTypes = [
    {id:"cash",slug:"cash",label:"Cash",cls:"ASSET",inv:false,cash:true},
    {id:"brokerage",slug:"brokerage",label:"Brokerage",cls:"ASSET",inv:true,cash:false},
    {id:"crypto",slug:"crypto",label:"Crypto",cls:"ASSET",inv:true,cash:false},
    {id:"real_estate",slug:"real_estate",label:"Real Estate",cls:"ASSET",inv:false,cash:false},
    {id:"retirement",slug:"retirement",label:"Retirement",cls:"ASSET",inv:true,cash:false},
    {id:"other_asset",slug:"other_asset",label:"Other Asset",cls:"ASSET",inv:false,cash:false},
    {id:"loan",slug:"loan",label:"Loan",cls:"LIABILITY",inv:false,cash:false},
    {id:"credit_card",slug:"credit_card",label:"Credit Card",cls:"LIABILITY",inv:false,cash:false},
    {id:"other_liability",slug:"other_liability",label:"Other Liability",cls:"LIABILITY",inv:false,cash:false},
  ];
  const holdings = [
    {id:"h_msb",name:"MSB",type:"cash",inst:"Maritime Bank",cur:"VND",status:"ACTIVE"},
    {id:"h_vcb",name:"VCB",type:"cash",inst:"Vietcombank",cur:"VND",status:"ACTIVE"},
    {id:"h_ibkr",name:"IBKR",type:"brokerage",inst:"Interactive Brokers",cur:"USD",status:"ACTIVE"},
    {id:"h_fmarket",name:"Fmarket",type:"brokerage",inst:"Fund platform",cur:"VND",status:"ACTIVE"},
    {id:"h_okx",name:"OKX · BTC",type:"crypto",inst:"OKX",cur:"BTC",status:"ACTIVE"},
    {id:"h_ssi",name:"SSI Retirement",type:"retirement",inst:"SSI",cur:"VND",status:"ACTIVE"},
    {id:"h_celesta",name:"Celesta Rise",type:"real_estate",inst:"Property",cur:"VND",status:"ACTIVE"},
    {id:"h_vinhomes",name:"Vinhomes Apt",type:"real_estate",inst:"Property",cur:"VND",status:"ACTIVE"},
    {id:"h_loan",name:"Home Loan",type:"loan",inst:"MSB",cur:"VND",status:"ACTIVE"},
  ];
  // 12 months of history: 2025-07 .. 2026-06. Native amounts; USD/BTC carry a per-unit price.
  // Apr/May/Jun 2026 are unchanged from the original 3-month seed.

/* ---------- calc engine (docs/07) ---------- */
const baseVal = (snap,hid)=>{const v=snap.values[hid];return v&&v[0]!=null?v[0]*v[1]:0;};
function completedSorted(){return DB.snapshots.filter(s=>s.status==="COMPLETED").sort((a,b)=>a.period<b.period?-1:1);}
function metrics(snap){
  let nw=0,inv=0,cash=0;
  for(const h of DB.holdings){const v=snap.values[h.id];if(!v||v[0]==null)continue;
    const t=type(h.type),bv=v[0]*v[1];
    if(t.cls==="ASSET")nw+=bv;else nw-=bv;
    if(t.inv)inv+=bv; if(t.cash)cash+=bv;}
  let ai=0,pi=0,ex=0,ic=0;
  for(const f of snap.flows){if(f.cat==="ACTIVE_INCOME")ai+=f.amount;
    else if(f.cat==="PASSIVE_INCOME")pi+=f.amount;else if(f.cat==="EXPENSE")ex+=f.amount;
    else if(f.cat==="INVESTMENT_CONTRIBUTION")ic+=f.amount;}
  const inc=ai+pi;
  return {netWorth:nw,investable:inv,cash,passive:pi,expenses:ex,active:ai,invested:ic,
    savings: inc===0?null:(inc-ex)/inc};
}
function prevOf(snap){const c=completedSorted();const i=c.findIndex(s=>s.id===snap.id);return i>0?c[i-1]:null;}
function trackedValue(snap,goal){
  if(goal.mode==="NET_WORTH")return metrics(snap).netWorth;
  return goal.holdingIds.reduce((s,hid)=>s+baseVal(snap,hid),0);
}
function goalProgress(goal){const c=completedSorted();if(!c.length)return {pct:0,tracked:0};
  const t=trackedValue(c[c.length-1],goal);return {pct:goal.target<=0?0:Math.max(0,Math.min(1,t/goal.target)),tracked:t,raw:t/goal.target};}
function goalPace(goal){const c=completedSorted();if(c.length<2)return null;
  const vals=c.map(s=>trackedValue(s,goal));const deltas=[];
  for(let i=1;i<vals.length;i++)deltas.push(vals[i]-vals[i-1]);
  const w=deltas.slice(-6);return w.reduce((a,b)=>a+b,0)/w.length;}
function goalProjection(goal){const c=completedSorted();const pace=goalPace(goal);
  const tracked=c.length?trackedValue(c[c.length-1],goal):0;const remaining=goal.target-tracked;
  if(pace===null)return {status:"insufficient-data"};
  if(remaining<=0)return {status:"achieved"};
  if(pace<=0)return {status:"not-on-pace"};
  const months=Math.ceil(remaining/pace);const date=addMonths(c[c.length-1].period,months);
  let paceStatus=null;
  if(goal.targetDate)paceStatus = date<=goal.targetDate ? "good":"warning";
  return {status:"projected",months,date,pace,paceStatus};}

/* what-if (docs/07 §3) */
function fv(pv,pmt,rA,n){const r=rA/12;if(Math.abs(r)<1e-12)return pv+pmt*n;
  const g=Math.pow(1+r,n);return pv*g+pmt*(g-1)/r;}
function solveMonths(pv,pmt,rA,target){const r=rA/12;
  if(Math.abs(r)<1e-12){if(pmt<=0)return pv>=target?0:Infinity;return Math.max(0,(target-pv)/pmt);}
  const denom=pv+pmt/r,numer=target+pmt/r;
  if(denom<=0||numer/denom<=0)return Infinity;
  const n=Math.log(numer/denom)/Math.log(1+r);return n>0?n:0;}
function mortgage(P,rA,years){const r=rA/12,n=years*12;
  const M = Math.abs(r)<1e-12 ? P/n : P*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  let bal=P;const series=[bal];for(let i=0;i<n;i++){const interest=bal*r;bal=bal-(M-interest);series.push(Math.max(0,bal));}
  return {payment:M,total:M*n,interest:M*n-P,series,n};}

  const slices=items.map(it=>{

    if(frac>=0.9999) return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${it.color}"/>`;
    const a1=a0+frac*2*Math.PI, large=frac>0.5?1:0;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    a0=a1;
    return `<path d="M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z" fill="${it.color}" stroke="var(--surface)" stroke-width="2" stroke-linejoin="round"/>`;

function deltaEl(cur,prev,opts={}){ if(prev==null||prev===undefined)return "";

  if(opts.neutral)cls="neutral"; else{const good=opts.invert?d<0:d>0; cls=good?"good":"down";}
  const suffix=opts.suffix||" vs last mo";
  return `<span class="delta ${cls}">${arrow} ${money(Math.abs(d))}${opts.hideSuffix?"":`<span class="muted" style="font-weight:500">${suffix}</span>`}</span>`;}

/* ---------- allocation datasets ---------- */
function assetAllocation(snap){
  const by={};for(const h of DB.holdings){const t=type(h.type);if(t.cls!=="ASSET")continue;
    const v=snap.values[h.id];if(!v)continue;by[h.type]=(by[h.type]||0)+v[0]*v[1];}
  return Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([slug,val])=>({label:type(slug).label,value:val,color:colorForType(slug)}));
}
function currencyAllocation(snap){
  const by={};for(const h of DB.holdings){const t=type(h.type);if(t.cls!=="ASSET")continue;
    const v=snap.values[h.id];if(!v)continue;by[h.cur]=(by[h.cur]||0)+v[0]*v[1];}
  const pal={VND:"var(--cat-1)",USD:"var(--cat-2)",BTC:"var(--cat-3)",ETH:"var(--cat-5)"};
  return Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([cur,val])=>({label:cur,value:val,color:pal[cur]||"var(--cat-8)"}));
}

function daysAgo(period){const[y,m]=period.split("-").map(Number);const d=new Date(y,m,1); // end of that month-ish
  const diff=Math.round((TODAY-new Date(y,m-1,28))/864e5);return diff>0?diff+" days ago":"recently";}

      <div class="muted" style="font-size:12.5px;margin-top:8px">${projText(pj)}</div></div>`;}).join("");
  return `<div class="page-head"><div><h1>Goals</h1><div class="sub">How long until you reach them, at your current pace${info("Progress toward each target, with projected completion from a moving average of your recent monthly change.")}</div></div>

function projPill(pj){
  if(pj.status==="achieved")return `<span class="pill good"><span class="dot"></span>Achieved</span>`;
  if(pj.paceStatus==="good")return `<span class="pill good"><span class="dot"></span>On track</span>`;
  if(pj.paceStatus==="warning")return `<span class="pill warn"><span class="dot"></span>Behind pace</span>`;
  if(pj.status==="not-on-pace")return `<span class="pill neutral"><span class="dot"></span>Not on pace</span>`;
  if(pj.status==="insufficient-data")return `<span class="pill neutral"><span class="dot"></span>Building history</span>`;
  return `<span class="pill neutral"><span class="dot"></span>On pace</span>`;}
function projText(pj){
  if(pj.status==="achieved")return "Target reached — congratulations.";
  if(pj.status==="insufficient-data")return "Need two check-ins to project pace.";
  if(pj.status==="not-on-pace")return "Flat or shrinking — no forward estimate.";
  return `Est. completion ${periodShort(pj.date)} · pace ${money(pj.pace)}/mo`;}

function viewGoalDetail(){
  const g=byId(DB.goals,state.goalId);const p=goalProgress(g),pj=goalProjection(g);
  const c=completedSorted();const series=c.map(s=>({p:s.period,v:trackedValue(s,g)}));
  // projection points
  let proj=[];
  if(pj.status==="projected"){let last=series[series.length-1];proj=[{p:last.p,v:last.v}];
    let pp=last.p,pv=last.v;for(let i=0;i<pj.months;i++){pp=addMonths(pp,1);pv+=pj.pace;proj.push({p:pp,v:Math.min(pv,g.target)});}}
  return `<div class="page-head"><div><button class="link" data-nav="goals" style="padding-left:0">← Goals</button>

function viewWhatIf(){

    <div class="tabs">${tabHtml}</div>
    <div class="card"><div class="wf" id="wf-root">${wfBody(nw)}</div></div>`;
}
const WF={future:{pv:3800000000,pmt:30000000,rate:8,years:15},
  compound:{pv:3800000000,pmt:0,rate:8,years:20},
  mortgage:{price:5000000000,rate:9.5,years:20},
  retire:{spend:600000000,wr:4,pv:3800000000,pmt:30000000,rate:8},
  goal:{pv:3800000000,pmt:30000000,rate:8,target:17000000000}};
function wfNum(id,label,val,step,suffix){return `<label class="field"><span class="lb">${label}</span>
  <input class="num" type="number" data-action="wf-in" data-k="${id}" value="${val}" step="${step||"any"}">${suffix?`<span class="muted" style="font-size:11px">${suffix}</span>`:""}</label>`;}
function wfBody(nw){
  const t=state.wf,s=WF[t];
  if(t==="mortgage"){const r=mortgage(s.price,s.rate/100,s.years);
    const series=r.series.filter((_,i)=>i%Math.ceil(r.n/48)===0).map((v,i)=>({p:addMonths(CUR_PERIOD,i*Math.ceil(r.n/48)),v}));
    return `<div>${wfNum("price","Loan amount (₫)",s.price,1000000)}
      ${wfNum("rate","Annual interest rate",s.rate,.1,"% — nominal, compounded monthly")}
      ${wfNum("years","Term (years)",s.years,1)}</div>
      <div><div class="kv"><span>Monthly payment</span><span class="v">${money(r.payment)}</span></div>
      <div class="kv"><span>Total interest paid</span><span class="v">${money(r.interest)}</span></div>
      <div class="kv"><span>Total repaid</span><span class="v">${money(r.total)}</span></div>
      <h2 style="margin:18px 0 2px;font-size:14px">Balance paydown</h2>${lineChart(series,{})}</div>`;}
  if(t==="retire"){const target=s.spend/(s.wr/100);const n=solveMonths(s.pv,s.pmt,s.rate/100,target);
    const proj=projSeries(s.pv,s.pmt,s.rate/100,Math.min(n,600));
    return `<div>${wfNum("spend","Desired annual spend (₫)",s.spend,1000000)}
      ${wfNum("wr","Safe withdrawal rate",s.wr,.1,"% — 4% rule by default")}
      ${wfNum("pv","Current amount (₫)",s.pv,1000000,"pre-filled from net worth")}
      ${wfNum("pmt","Monthly contribution (₫)",s.pmt,1000000)}
      ${wfNum("rate","Expected annual return",s.rate,.1,"%")}</div>
      <div><div class="kv"><span>Required nest egg</span><span class="v">${money(target)}</span></div>
      ${solveOut(n)}<h2 style="margin:18px 0 2px;font-size:14px">Path to target</h2>${lineChart(proj,{target})}</div>`;}
  if(t==="goal"){const n=solveMonths(s.pv,s.pmt,s.rate/100,s.target);
    const proj=projSeries(s.pv,s.pmt,s.rate/100,Math.min(isFinite(n)?n:240,600));
    return `<div>${wfNum("pv","Current amount (₫)",s.pv,1000000,"pre-filled from net worth")}
      ${wfNum("pmt","Monthly contribution (₫)",s.pmt,1000000)}
      ${wfNum("rate","Expected annual return",s.rate,.1,"%")}
      ${wfNum("target","Target amount (₫)",s.target,1000000)}</div>
      <div>${solveOut(n)}<h2 style="margin:18px 0 2px;font-size:14px">Projected growth</h2>${lineChart(proj,{target:s.target})}</div>`;}
  // future / compound
  const F=fv(s.pv,s.pmt,s.rate/100,s.years*12);const proj=projSeries(s.pv,s.pmt,s.rate/100,s.years*12);
  const contrib=s.pv+s.pmt*s.years*12;
  return `<div>${wfNum("pv","Current amount (₫)",s.pv,1000000)}
    ${t==="future"?wfNum("pmt","Monthly contribution (₫)",s.pmt,1000000):""}
    ${wfNum("rate","Expected annual return",s.rate,.1,"%")}
    ${wfNum("years","Years",s.years,1)}</div>
    <div><div class="kv"><span>Value in ${s.years} years</span><span class="v">${money(F)}</span></div>
    <div class="kv"><span>Total contributed</span><span class="v">${money(contrib)}</span></div>
    <div class="kv"><span>Growth</span><span class="v">${money(F-contrib)}</span></div>
    <h2 style="margin:18px 0 2px;font-size:14px">Projected growth</h2>${lineChart(proj,{})}</div>`;
}
function projSeries(pv,pmt,rA,months){const out=[];const step=Math.max(1,Math.ceil(months/48));
  for(let i=0;i<=months;i+=step)out.push({p:addMonths(CUR_PERIOD,i),v:fv(pv,pmt,rA,i)});return out;}
function solveOut(n){if(!isFinite(n))return `<div class="banner">⚠︎ Not reachable with these inputs — raise the contribution or return.</div>`;
  const yrs=Math.floor(n/12),mo=Math.ceil(n%12);const date=addMonths(CUR_PERIOD,Math.ceil(n));
  return `<div class="kv"><span>Estimated time</span><span class="v">${yrs}y ${mo}mo</span></div>
    <div class="kv"><span>Target date</span><span class="v">${periodShort(date)}</span></div>`;}

const STEPS=["Review","Holdings","Add / Archive","Income","Complete"];
let wz={step:0};
function startCheckin(){
  const c=completedSorted();const base=c[c.length-1];
  const values={};
  for(const h of DB.holdings){if(h.status!=="ACTIVE")continue;
    const bv=base&&base.values[h.id]?base.values[h.id].slice():[null,h.cur==="VND"?1:(base&&base.values[h.id]?base.values[h.id][1]:1)];
    values[h.id]=bv;}
  const flows=base?base.flows.map(f=>({...f})):[
    {cat:"ACTIVE_INCOME",label:"Salary",amount:0},{cat:"EXPENSE",label:"Living expenses",amount:0}];
  DB.draft={id:"s_"+CUR_PERIOD,period:CUR_PERIOD,status:"DRAFT",version:1,notes:null,values,flows};
  wz={step:base?0:1};openWizard();
}
function resumeCheckin(){wz={step:wz.step||0};openWizard();}
function openWizard(){$("#overlay").innerHTML=wizard();$("#overlay").style.display="block";}
function closeWizard(){$("#overlay").innerHTML="";$("#overlay").style.display="none";render();}
function wizard(){
  const d=DB.draft;
  const stepsHtml=STEPS.map((s,i)=>`${i?`<span class="bar ${i<=wz.step?"done":""}"></span>`:""}
    <span class="st ${i<wz.step?"done":""} ${i===wz.step?"cur":""}"><span class="dot">${i<wz.step?"✓":i+1}</span>${s}</span>`).join("");
  return `<div class="overlay-inner">
    <div class="wz-top"><div class="line1"><h2>Financial Check-in — ${periodLabel(CUR_PERIOD)}</h2>
      <button class="btn sm" data-action="wz-exit">Save &amp; exit</button></div>
      <div class="steps">${stepsHtml}</div></div>
    <div class="wz-body">${wzStep()}</div>
    <div class="wz-foot">
      <button class="btn" data-action="wz-back" ${wz.step===0?"disabled style=visibility:hidden":""}>← Back</button>
      ${wz.step<4?`<button class="btn pri" data-action="wz-next">Continue →</button>`
        :`<button class="btn pri" data-action="wz-complete">Complete Check-in ✓</button>`}
    </div></div>`;
}
function wzStep(){
  const d=DB.draft;
  if(wz.step===0){ // review copied data
    const c=completedSorted();const base=c[c.length-1];
    return `<h3>Review last month</h3><p class="lead">We copied ${periodShort(base.period)} forward as your starting point. Update only what changed.</p>
      <div class="banner">↻ ${DB.holdings.filter(h=>h.status==="ACTIVE").length} holdings and ${d.flows.length} income/expense lines copied from ${periodShort(base.period)}.</div>
      <div style="margin-top:16px">${holdingSummaryList()}</div>`;
  }
  if(wz.step===1){ // update holdings
    return `<h3>Update your holdings${info("Values are pre-filled from last month — edit only what changed. Foreign-currency and crypto rates are set once, in Exchange rates above.")}</h3><p class="lead">Change the current value of anything that moved. Set foreign-currency and crypto rates once, above — they apply to every holding in that currency.</p>
      ${ratesPanel()}${holdingEditor()}`;
  }
  if(wz.step===2){ // add / archive
    return `<h3>Add or archive holdings</h3><p class="lead">Add anything new; archive accounts you've closed (their history is preserved).</p>
      <button class="btn pri" data-action="add-holding" style="margin-bottom:14px">+ Add holding</button>
      ${DB.holdings.filter(h=>h.status==="ACTIVE").map(h=>`<div class="edit-row">
        <div class="nm">${esc(h.name)}<div class="sub">${type(h.type).label} · ${h.cur}</div></div>
        <button class="btn sm" data-action="archive" data-id="${h.id}">Archive</button></div>`).join("")}`;
  }
  if(wz.step===3){ // income & expenses
    const cat=(c,title)=>{const rows=d.flows.map((f,i)=>({f,i})).filter(x=>x.f.cat===c);
      return `<div style="margin-bottom:18px"><div class="eyebrow" style="margin-bottom:8px">${title}</div>
        ${rows.map(({f,i})=>`<div class="edit-row"><input style="flex:1" value="${esc(f.label)}" data-action="flow-label" data-i="${i}">
          <input class="num" style="width:170px" type="number" step="1000000" value="${f.amount}" data-action="flow-amt" data-i="${i}"></div>`).join("")||'<div class="muted" style="font-size:13px;padding:6px 0">None</div>'}
        <button class="link" data-action="add-flow" data-cat="${c}" style="padding-left:0">+ Add line</button></div>`;};
    return `<h3>Income &amp; expenses</h3><p class="lead">Monthly totals for this period — not individual transactions.</p>
      ${cat("ACTIVE_INCOME","Active income")}${cat("PASSIVE_INCOME","Passive income")}
      ${cat("EXPENSE","Expenses")}${cat("INVESTMENT_CONTRIBUTION","Investment contributions")}`;
  }
  // step 4 — review & complete
  const m=metrics(d);const base=completedSorted().slice(-1)[0];const pm=base?metrics(base):null;
  const line=(k,v,delta)=>`<div class="rvw"><span class="k">${k}</span><span class="v"><span class="num">${v}</span>${delta||""}</span></div>`;
  return `<h3>Review ${periodLabel(CUR_PERIOD)}${info("Every figure with its change vs last month — the moment that answers 'did we stay on track?' Confirm to save the snapshot.")}</h3><p class="lead">This is the moment that answers “did we stay on track?”</p>
    ${line("Net worth",money(m.netWorth),deltaEl(m.netWorth,pm&&pm.netWorth))}
    ${line("Cash position",money(m.cash),deltaEl(m.cash,pm&&pm.cash))}
    ${line("Investable assets",money(m.investable),deltaEl(m.investable,pm&&pm.investable))}
    ${line("Passive income",money(m.passive),deltaEl(m.passive,pm&&pm.passive))}
    ${line("Monthly invested",money(m.invested),"")}
    ${line("Savings rate",m.savings==null?"—":(m.savings*100).toFixed(0)+"%",pm?savingsDelta(m.savings,pm.savings):"")}
    <label class="field" style="margin-top:20px"><span class="lb">Notes (optional)</span>
      <input value="${esc(d.notes||"")}" data-action="draft-note" placeholder="e.g. Returned to Vietnam"></label>`;
}
function holdingSummaryList(){const d=DB.draft;
  return DB.holdings.filter(h=>h.status==="ACTIVE").map(h=>{const v=d.values[h.id];const bv=v&&v[0]!=null?v[0]*v[1]:null;
    return `<div class="hrow"><span class="sw" style="width:9px;height:9px;border-radius:2px;background:${colorForType(h.type)}"></span>

function holdingEditor(){const d=DB.draft;

  return DB.holdingTypes.map(t=>groups[t.id]?`<div class="grp"><div class="grp-head"><span class="gname" style="color:${colorForType(t.slug)}">${t.label}</span></div>

/* ---- FX rate remembering: one rate per currency, pre-filled from last month ---- */
function draftCurrencyRate(cur){const d=DB.draft;const h=DB.holdings.find(h=>h.status==="ACTIVE"&&h.cur===cur&&d.values[h.id]);return h?d.values[h.id][1]:1;}
function baseRateFor(snap,cur){const h=DB.holdings.find(h=>h.cur===cur&&snap.values[h.id]);return h?snap.values[h.id][1]:null;}
function draftForeignCurrencies(){const d=DB.draft;
  return [...new Set(DB.holdings.filter(h=>h.status==="ACTIVE"&&d.values[h.id]&&h.cur!==DB.household.base).map(h=>h.cur))];}
function ratesPanel(){
  const d=DB.draft,base=completedSorted().slice(-1)[0],curs=draftForeignCurrencies();
  if(!curs.length)return "";
  return `<div class="card" style="margin-bottom:18px;background:var(--surface-2);box-shadow:none">
    <h2 style="margin-bottom:2px">Exchange rates${info("One rate per currency, applied to every holding in it. Pre-filled from last month — update only if it moved.")}</h2>
    <div class="hint" style="margin-bottom:12px">Price of 1 unit in ${DB.household.base}, remembered from your last check-in.</div>
    ${curs.map(cur=>{const rate=draftCurrencyRate(cur),last=base?baseRateFor(base,cur):null;
      return `<div class="edit-row"><div class="nm" style="flex:none;width:120px">1 ${cur}<div class="sub">→ ${DB.household.base}</div></div>
        <input class="rate num" type="number" step="any" value="${rate}" data-action="cur-rate" data-cur="${cur}">
        <span class="bv num" style="width:auto;white-space:nowrap">${last?`last month ${full(last)}`:"new"}</span></div>`;}).join("")}
  </div>`;
}
/* ---- sanity guard: flag implausible changes before saving ---- */
function checkAnomalies(){
  const d=DB.draft,base=completedSorted().slice(-1)[0];if(!base)return [];
  const out=[];
  for(const h of DB.holdings){const v=d.values[h.id];if(!v||v[0]==null)continue;
    const ov=base.values[h.id]?base.values[h.id][0]:null;if(ov==null||ov===0)continue;
    const r=v[0]/ov;if(r>=3||r<=0.34)out.push({label:h.name+" ("+h.cur+")",
      disp:(nativeStr(h,ov)||full(ov))+" → "+(nativeStr(h,v[0])||full(v[0])),pct:(r-1)*100});}
  for(const cur of draftForeignCurrencies()){const nr=draftCurrencyRate(cur),or=base?baseRateFor(base,cur):null;
    if(!or||!nr)continue;const r=nr/or;if(r>=3||r<=0.34)out.push({label:cur+" → "+DB.household.base+" rate",disp:full(or)+" → "+full(nr),pct:(r-1)*100});}
  return out;
}
function anomalyModal(anom){
  const rows=anom.map(a=>`<div class="rvw"><span class="k">${esc(a.label)}</span>
    <span class="v"><span class="num">${esc(a.disp)}</span> <span class="delta" style="color:var(--warn-ink)">${a.pct>0?"▲":"▼"} ${Math.abs(a.pct).toFixed(0)}%</span></span></div>`).join("");
  modal(`<h3>Double-check these big changes</h3>
    <div class="muted" style="font-size:12.5px;margin:-6px 0 12px">These moved a lot since last month. If they're right, go ahead — Atlas just wants to catch typos before saving.</div>
    ${rows}
    <div class="actions"><button class="btn" data-action="modal-close">Let me review</button>
      <button class="btn pri" data-action="wz-complete-force">These are correct — complete</button></div>`);
}
function completeCheckin(force){
  const d=DB.draft;
  if(!force){const anom=checkAnomalies();if(anom.length){anomalyModal(anom);return;}}
  d.status="COMPLETED";
  // clean any null-valued holdings to 0 so metrics are defined
  for(const k in d.values){if(d.values[k][0]==null)d.values[k][0]=0;}
  DB.snapshots=DB.snapshots.filter(s=>s.period!==d.period);DB.snapshots.push(d);DB.draft=null;
  closeWizard();state.view="home";render();toast("Check-in complete — snapshot saved");
}

function setTheme(){const cur=document.documentElement.getAttribute("data-theme");
  const sysDark=matchMedia("(prefers-color-scheme:dark)").matches;
  const next=cur?(cur==="dark"?"light":"dark"):(sysDark?"light":"dark");
  document.documentElement.setAttribute("data-theme",next);}

document.addEventListener("input",e=>{
  const a=e.target.dataset.action;if(!a)return;const d=DB.draft;
  if(a==="hv"){const id=e.target.dataset.id,f=+e.target.dataset.f;
    d.values[id][f]=e.target.value===""?(f===0?null:d.values[id][1]):+e.target.value;
    const bv=$(`[data-bv="${id}"]`);if(bv)bv.textContent=d.values[id][0]==null?"—":money(d.values[id][0]*d.values[id][1]);}
  if(a==="flow-amt"){d.flows[+e.target.dataset.i].amount=+e.target.value||0;}
  if(a==="flow-label"){d.flows[+e.target.dataset.i].label=e.target.value;}
  if(a==="draft-note"){d.notes=e.target.value;}
  if(a==="wf-in"){WF[state.wf][e.target.dataset.k]=+e.target.value||0;
    const c=completedSorted();const nw=c.length?metrics(c[c.length-1]).netWorth:0;
    $("#wf-root").innerHTML=wfBody(nw);}
  if(a==="ev"){const s=state.editSnap,id=e.target.dataset.id,f=+e.target.dataset.f;
    s.values[id][f]=+e.target.value||0;const bv=$(`[data-ebv="${id}"]`);if(bv)bv.textContent=money(s.values[id][0]*s.values[id][1]);}
  if(a==="set-color-input"){const ht=byId(DB.holdingTypes,e.target.dataset.id);ht.color=e.target.value;render();}
  if(a==="base-cur"){setBaseCurrency(e.target.value);render();toast("Base currency → "+e.target.value);}
  if(a==="cur-rate"){const cur=e.target.dataset.cur,rate=+e.target.value||0;
    DB.holdings.filter(h=>h.status==="ACTIVE"&&h.cur===cur&&d.values[h.id]).forEach(h=>{d.values[h.id][1]=rate;
      const rl=$(`[data-rate="${h.id}"]`);if(rl)rl.textContent="× "+full(rate);
      const bv=$(`[data-bv="${h.id}"]`);if(bv)bv.textContent=d.values[h.id][0]==null?"—":money(d.values[h.id][0]*rate);});}
});

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action],[data-nav]");if(!t)return;
  const a=t.dataset.action,nav=t.dataset.nav,id=t.dataset.id;
  if(nav){state.view=nav;state.goalId=null;render();return;}
  switch(a){
    case "theme":setTheme();break;
    case "info":toast(t.dataset.tip,5000);break;
    case "start":startCheckin();break;
    case "resume":resumeCheckin();break;
    case "discard":DB.draft=null;render();toast("Draft discarded");break;
    case "wz-next":wz.step=Math.min(4,wz.step+1);openWizard();break;
    case "wz-back":wz.step=Math.max(0,wz.step-1);openWizard();break;
    case "wz-exit":closeWizard();toast("Draft saved — resume anytime");break;
    case "wz-complete":completeCheckin();break;
    case "wz-complete-force":closeModal();completeCheckin(true);break;
    case "wf-tab":state.wf=id;render();break;
    case "trend-mode":state.trendMode=id;render();break;
    case "goal":state.view="goals";state.goalId=id;render();break;
    case "del-goal":DB.goals=DB.goals.filter(g=>g.id!==id);state.goalId=null;render();toast("Goal deleted");break;
    case "archive":{const h=byId(DB.holdings,id);h.status="ARCHIVED";
      if(DB.draft)delete DB.draft.values[id];
      if($("#overlay").style.display==="block")openWizard();else render();toast(h.name+" archived");break;}
    case "hist":historyModal(id);break;
    case "add-holding":addHoldingModal();break;
    case "add-holding-save":saveHolding();break;
    case "add-goal":addGoalModal();break;
    case "add-goal-save":saveGoal();break;
    case "add-type":addTypeModal();break;
    case "add-type-save":saveType();break;
    case "pick-color":colorModal(id);break;
    case "set-color":{const ht=byId(DB.holdingTypes,id);ht.color=t.dataset.color;closeModal();render();toast("Color updated");break;}
    case "reset-color":{const ht=byId(DB.holdingTypes,id);delete ht.color;closeModal();render();toast("Color reset to default");break;}
    case "add-flow":{DB.draft.flows.push({cat:t.dataset.cat,label:"New line",amount:0});openWizard();break;}
    case "open-snap":openSnapshotEditor(id);break;
    case "save-snap":saveSnap(id);break;
    case "reset":DB=seed();state.view="home";state.goalId=null;render();toast("Demo data reset");break;
    case "modal-close":case "modal-bg":if(e.target===t)closeModal();break;
  }
});
function historyModal(id){const h=byId(DB.holdings,id);const c=completedSorted();
  const vals=c.map(s=>s.values[id]?s.values[id][0]*s.values[id][1]:0);
  const rows=c.slice().reverse().map(s=>{const v=s.values[id];return `<div class="kv"><span>${periodShort(s.period)}</span>
    <span class="v">${v?money(v[0]*v[1]):"—"}${nativeStr(h,v?v[0]:0)?`<span class="muted" style="font-weight:500;font-size:12px"> · ${nativeStr(h,v[0])}</span>`:""}</span></div>`;}).join("");
  modal(`<h3>${esc(h.name)}<span class="muted" style="font-weight:500;font-size:13px"> · ${type(h.type).label}</span></h3>
    <div style="margin:6px 0 14px">${sparkline(vals)}</div>${rows}
    <div class="actions"><button class="btn pri" data-action="modal-close">Close</button></div>`);}
function saveHolding(){const name=$("#m-name").value.trim();if(!name)return toast("Enter a name");
  const cur=$("#m-cur").value.trim()||DB.household.base;const val=+$("#m-val").value||0;const rate=cur===DB.household.base?1:(+$("#m-rate").value||1);
  const hid="h_"+Date.now();DB.holdings.push({id:hid,name,type:$("#m-type").value,inst:"",cur,status:"ACTIVE"});
  if(DB.draft)DB.draft.values[hid]=[val,rate];
  closeModal();if($("#overlay").style.display==="block")openWizard();else render();toast(name+" added");}
function saveGoal(){const name=$("#g-name").value.trim()||$("#g-type").value;
  const mode=$("#g-mode").value;const g={id:"g_"+Date.now(),type:$("#g-type").value,name,
    target:+$("#g-target").value||0,targetDate:null,mode,holdingIds:mode==="HOLDING_SUBSET"?[$("#g-hold").value]:[],status:"ACTIVE"};
  DB.goals.push(g);closeModal();state.view="goals";render();toast("Goal created");}
function saveType(){const label=$("#t-label").value.trim();if(!label)return toast("Enter a label");
  DB.holdingTypes.push({id:"t_"+Date.now(),slug:label.toLowerCase().replace(/\s+/g,"_"),label,
    cls:$("#t-cls").value,inv:$("#t-inv").checked,cash:$("#t-cash").checked,household:true});
  closeModal();render();toast(label+" added");}
function saveSnap(id){const s=byId(DB.snapshots,id);const e=state.editSnap;
  s.values=e.values;s.notes=$("#e-note").value||null;s.version=(s.version||1)+1;
  closeModal();render();toast("Snapshot updated · v"+s.version);}

render();
</script>
